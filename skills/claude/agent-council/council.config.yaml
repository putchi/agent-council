# Agent Council - default config (tech council)
# 
# This config is used by the legacy council.sh job runner.
# For the full multi-domain experience use run-council.sh instead:
#
#   bash scripts/run-council.sh --council tech|career|business|personal "question"
#
# If you use council.sh directly, update the command paths below
# to match your actual install location.

council:
  chairman:
    role: "auto"
  members:
    - name: architect
      command: "/path/to/agent-council/scripts/member-tech-architect.sh"
      emoji: "🏗️"
      color: "CYAN"
    - name: critic
      command: "/path/to/agent-council/scripts/member-tech-critic.sh"
      emoji: "🔍"
      color: "RED"
    - name: devil
      command: "/path/to/agent-council/scripts/member-tech-devil.sh"
      emoji: "😈"
      color: "MAGENTA"
    - name: pragmatist
      command: "/path/to/agent-council/scripts/member-tech-pragmatist.sh"
      emoji: "⚙️"
      color: "YELLOW"
  settings:
    exclude_chairman_from_members: true
    timeout: 120
